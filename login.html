<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusMate Login</title>

<!-- ✅ FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    width: 350px;
    background: #1a1d26;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 93%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    outline: none;
    background: #2a2d36;
    color: white;
}

/* PASSWORD BOX (ICON OUTSIDE) */
.password-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.eye {
    cursor: pointer;
    color: #aaa;
    font-size: 18px;
}

.eye:hover {
    color: #d9ff00;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #d9ff00;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.8;
}

/* TOGGLE TEXT */
.toggle {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.toggle span {
    color: #d9ff00;
    cursor: pointer;
}

/* HIDDEN */
.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" placeholder="Email">

        <div class="password-box">
            <input type="password" id="loginPassword" placeholder="Password">
            <i class="fa-solid fa-eye eye" onclick="togglePassword('loginPassword', this)"></i>
        </div>

        <button>Login</button>

        <div class="toggle">
            Don't have an account? <span onclick="showSignup()">Sign up</span>
        </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="hidden">
        <h2>Sign Up</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">

        <div class="password-box">
            <input type="password" id="signupPassword" placeholder="Password">
            <i class="fa-solid fa-eye eye" onclick="togglePassword('signupPassword', this)"></i>
        </div>

        <button>Create Account</button>

        <div class="toggle">
            Already have an account? <span onclick="showLogin()">Login</span>
        </div>
    </div>

</div>

<script>
function showSignup() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

// 🔥 TOGGLE PASSWORD
function togglePassword(id, icon) {
    let input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
