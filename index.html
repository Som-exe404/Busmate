<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusMate - Home</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: white;
        }

        /* TOP BAR */
        .top-bar {
            background: #d9ff00;
            color: black;
            text-align: center;
            padding: 8px;
            font-weight: bold;
        }

        /* NAVBAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: transparent;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        nav a:hover {
            color: #d9ff00;
        }

        /* HERO SECTION */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px;
        }

        .hero-text {
            max-width: 50%;
        }

        .hero-text h1 {
            font-size: 60px;
            font-weight: bold;
            line-height: 1.1;
        }

        .hero-text p {
            color: #aaa;
            margin: 20px 0;
        }

        .btn {
            background: #d9ff00;
            color: black;
            padding: 12px 30px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .hero-img img {
            width: 500px;
            border-radius: 10px;
        }

        /* COLLECTION SECTION */
        .collections {
            padding: 50px;
        }

        .collections h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: #1a1d26;
            height: 120px;
            flex: 1;
            border-radius: 8px;
        }

        /* RESPONSIVE */
        @media(max-width: 900px) {
            .hero-section {
                flex-direction: column;
                text-align: center;
            }

            .hero-text {
                max-width: 100%;
            }

            .hero-img img {
                width: 100%;
                margin-top: 20px;
            }

            .cards {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- TOP STRIP -->
<div class="top-bar">!! More features coming soon, Stay tuned !! </div>

<!-- NAVBAR -->
<header>
    <div class="logo">BusMate</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero-section">
    
    <div class="hero-text">
        <h1>WELCOME TO BUSMATE</h1>
        <p>Track buses, view routes and manage your daily travel easily.</p>
        
    </div>

    <div class="hero-img">
        <img src="hero image.png" alt="Bus Image">
    </div>

</section>

<!-- COLLECTIONS / FEATURES -->
<section class="collections">
    <h2>Features</h2>

    <div class="cards">
        <div class="card"></div>
        <div class="card"></div>
    </div>
</section>

</body>
</html>
