<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusMate - Contact</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: white;
}

/* TOP BAR */
.top-bar {
    background: #d9ff00;
    color: black;
    text-align: center;
    padding: 8px;
    font-weight: bold;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
}

nav a:hover {
    color: #d9ff00;
}

/* CONTACT SECTION */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 50px 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    color: #aaa;
    margin-bottom: 30px;
}

/* FORM */
.form-box {
    background: #1a1d26;
    padding: 30px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background: #2a2d36;
    color: white;
}

textarea {
    height: 120px;
    resize: none;
}

/* BUTTON */
button {
    background: #d9ff00;
    color: black;
    padding: 12px 25px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

/* INFO SECTION */
.info {
    margin-top: 40px;
    color: #bbb;
}

/* RESPONSIVE */
@media(max-width: 768px) {
    header {
        flex-direction: column;
        gap: 10px;
    }
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">BusMate Support</div>

<!-- NAVBAR -->
<header>
    <div class="logo">BusMate</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="#">Routes</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- CONTACT SECTION -->
<div class="container">

    <h1>Contact Us</h1>
    <p>Have any issues or queries? Reach out to us anytime.</p>

    <div class="form-box">
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea placeholder="Your Message"></textarea>
        <button>Send Message</button>
    </div>

    <div class="info">
        <p>Email: support@busmate.com</p>
        <p>Phone: +91 XXXXX XXXXX</p>
    </div>

</div>

</body>
</html>
